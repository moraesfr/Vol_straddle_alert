name: Daily Market Close Alert

on:
  schedule:
    # 19:00 America/Sao_Paulo == 22:00 UTC
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

jobs:
  run-daily-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      TZ: America/Sao_Paulo
      ALERT_SMTP_HOST: ${{ secrets.ALERT_SMTP_HOST }}
      ALERT_SMTP_PORT: ${{ secrets.ALERT_SMTP_PORT }}
      ALERT_SMTP_USER: ${{ secrets.ALERT_SMTP_USER }}
      ALERT_SMTP_PASS: ${{ secrets.ALERT_SMTP_PASS }}
      ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
      ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
      ALERT_SMTP_USE_TLS: ${{ secrets.ALERT_SMTP_USE_TLS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install yfinance pandas numpy

      - name: Run daily alert and send email
        working-directory: python_test
        run: python3 run_daily_alert.py
